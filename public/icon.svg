<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Its Games Night icon</title>
  <desc id="desc">A purple square icon with a vertical ITS label and stacked G N initials.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)" />
  <text
    x="26"
    y="64"
    fill="#c084fc"
    font-family="Arial, Helvetica, sans-serif"
    font-size="24"
    font-style="italic"
    font-weight="900"
    text-anchor="middle"
    dominant-baseline="middle"
    transform="rotate(-90 26 64)"
  >
    ITS
  </text>
  <text
    x="48"
    y="58"
    fill="#ffffff"
    font-family="Arial, Helvetica, sans-serif"
    font-size="34"
    font-style="italic"
    font-weight="900"
    letter-spacing="-2"
  >
    G
  </text>
  <text
    x="48"
    y="93"
    fill="#c084fc"
    font-family="Arial, Helvetica, sans-serif"
    font-size="34"
    font-style="italic"
    font-weight="900"
    letter-spacing="-2"
  >
    N
  </text>
</svg>